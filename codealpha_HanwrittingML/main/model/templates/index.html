<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InkLogic | AI Recognition</title>
    <style>
        :root {
            --primary: #10b981; /* Emerald */
            --bg: #1f2937;      /* Charcoal */
            --card: #ffffff;
            --text: #374151;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: var(--card); padding: 2rem; border-radius: 1rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h1 { color: var(--bg); margin-bottom: 0.5rem; }
        .logo { width: 80px; margin-bottom: 1rem; }
        
        /* Styled File Upload */
        .file-upload { position: relative; display: inline-block; width: 100%; margin: 1.5rem 0; }
        .file-upload label { display: block; padding: 12px; background: #f3f4f6; border: 2px dashed #d1d5db; border-radius: 0.5rem; cursor: pointer; transition: 0.2s; }
        .file-upload label:hover { border-color: var(--primary); background: #ecfdf5; }
        .file-upload input { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        button { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 0.5rem; font-weight: 600; cursor: pointer; font-size: 1rem; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }

        /* Result Explanation */
        .result-box { margin-top: 2rem; padding: 1rem; border-radius: 0.5rem; background: #f9fafb; display: none; }
        .prediction-value { font-size: 3rem; font-weight: 800; color: var(--primary); margin: 0; }
        .explanation { font-size: 0.85rem; color: #6b7280; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="container">
        <img src="/download.png" alt="InkLogic Logo" class="logo">
        <h1>InkLogic</h1>
        <p>AI-Powered Handwritten Recognition</p>
        
        <div class="file-upload">
            <label id="fileLabel">Click to upload handwriting image</label>
            <input type="file" id="imageInput" accept="image/*" onchange="updateLabel()">
        </div>

        <button onclick="analyzeImage()">Identify Character</button>

        <div id="resultBox" class="result-box">
            <p style="margin:0; font-weight:600;">AI Result:</p>
            <p class="prediction-value" id="predVal">-</p>
            <p id="confVal" style="font-weight: bold;"></p>
            <hr>
            <p class="explanation">
                <strong>What does this mean?</strong><br>
                The <strong>Prediction</strong> is the character the AI is most certain it sees. 
                The <strong>Confidence</strong> represents the AI's "certainty" level out of 100%.
            </p>
        </div>
    </div>

    <script>
        function updateLabel() {
            const name = document.getElementById('imageInput').files[0].name;
            document.getElementById('fileLabel').innerText = name;
        }

        async function analyzeImage() {
            const input = document.getElementById('imageInput');
            if (input.files.length === 0) return alert("Please select an image.");

            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('predVal').innerText = "...";

            const formData = new FormData();
            formData.append('image', input.files[0]);

            const response = await fetch('/predict', { method: 'POST', body: formData });
            const data = await response.json();

            document.getElementById('predVal').innerText = data.prediction;
            document.getElementById('confVal').innerText = "AI Certainty: " + data.confidence + "%";
        }
    </script>
</body>
</html>
